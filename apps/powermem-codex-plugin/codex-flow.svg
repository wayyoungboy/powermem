<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">PowerMem Codex Plugin Flow</title>
  <desc id="desc">PowerMem Codex plugin lifecycle: install and init, runtime hooks, and progressive uninstall layers.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#344256"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #536078; }
      .lane { fill: #ffffff; stroke: #d7dfeb; stroke-width: 2; rx: 22; }
      .lane-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1d2a3d; }
      .node { fill: #ffffff; stroke: #8ba0bf; stroke-width: 2; rx: 16; }
      .node-blue { fill: #eef6ff; stroke: #477bd3; stroke-width: 2; rx: 16; }
      .node-green { fill: #edf9f1; stroke: #45a260; stroke-width: 2; rx: 16; }
      .node-purple { fill: #f4f0ff; stroke: #8064d8; stroke-width: 2; rx: 16; }
      .node-orange { fill: #fff7e8; stroke: #cf8a22; stroke-width: 2; rx: 16; }
      .node-red { fill: #fff1f1; stroke: #c45a5a; stroke-width: 2; rx: 16; }
      .decision { fill: #fffdf6; stroke: #8f6a25; stroke-width: 2; }
      .node-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .node-text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #465166; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #607086; }
      .mono { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #273348; }
      .arrow { fill: none; stroke: #344256; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #8794a8; stroke-width: 2.2; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .callout { fill: #fbfdff; stroke: #ccd7e6; stroke-width: 1.5; rx: 14; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1280"/>
  <text x="84" y="78" class="title">PowerMem Codex Plugin 流程图</text>
  <text x="84" y="116" class="subtitle">Codex hooks 直接调用 PowerMem HTTP API，不走 MCP；init skill 负责选择后端、身份作用域与本地服务配置。</text>

  <rect class="lane" x="60" y="160" width="520" height="980"/>
  <rect class="lane" x="640" y="160" width="520" height="980"/>
  <rect class="lane" x="1220" y="160" width="520" height="980"/>

  <text x="320" y="210" text-anchor="middle" class="lane-title">1. 安装与 Init</text>
  <text x="900" y="210" text-anchor="middle" class="lane-title">2. Hook 运行时</text>
  <text x="1480" y="210" text-anchor="middle" class="lane-title">3. 三层卸载</text>

  <!-- Init lane -->
  <rect class="node-blue" x="120" y="250" width="400" height="88"/>
  <text x="320" y="284" text-anchor="middle" class="node-title">安装插件并信任 hooks</text>
  <text x="320" y="312" text-anchor="middle" class="mono">codex plugin add powermem-codex-plugin</text>

  <rect class="node" x="120" y="386" width="400" height="86"/>
  <text x="320" y="420" text-anchor="middle" class="node-title">运行 init skill</text>
  <text x="320" y="448" text-anchor="middle" class="mono">$powermem-codex-plugin:init</text>

  <polygon class="decision" points="320,522 500,612 320,702 140,612"/>
  <text x="320" y="594" text-anchor="middle" class="node-title">选择后端</text>
  <text x="320" y="622" text-anchor="middle" class="node-text">已有集群 / 本地 / 修复</text>

  <rect class="node-green" x="94" y="752" width="452" height="116"/>
  <text x="320" y="789" text-anchor="middle" class="node-title">本地后端继续选择</text>
  <text x="320" y="818" text-anchor="middle" class="node-text">零配置 no-LLM / 导入 .env / 手动配置</text>
  <text x="320" y="846" text-anchor="middle" class="small">远端集群则验证 /api/v1/system/health</text>

  <rect class="node-purple" x="94" y="918" width="452" height="118"/>
  <text x="320" y="953" text-anchor="middle" class="node-title">配置记忆身份作用域</text>
  <text x="320" y="982" text-anchor="middle" class="node-text">跳过 / 只设 user_id / user_id + agent_id</text>
  <text x="320" y="1010" text-anchor="middle" class="mono">POWERMEM_USER_ID, POWERMEM_AGENT_ID=codex</text>

  <rect class="node-orange" x="120" y="1076" width="400" height="78"/>
  <text x="320" y="1107" text-anchor="middle" class="node-title">写入 runtime.env</text>
  <text x="320" y="1134" text-anchor="middle" class="mono">~/.powermem/runtime.env</text>

  <!-- Runtime lane -->
  <rect class="node-purple" x="700" y="250" width="400" height="96"/>
  <text x="900" y="286" text-anchor="middle" class="node-title">UserPromptSubmit hook</text>
  <text x="900" y="314" text-anchor="middle" class="node-text">每次用户输入前触发</text>

  <rect class="node-blue" x="700" y="400" width="400" height="112"/>
  <text x="900" y="436" text-anchor="middle" class="node-title">搜索相关记忆</text>
  <text x="900" y="464" text-anchor="middle" class="mono">POST /api/v1/memories/search</text>
  <text x="900" y="490" text-anchor="middle" class="small">使用 base_url + user_id + agent_id</text>

  <rect class="node-green" x="700" y="566" width="400" height="112"/>
  <text x="900" y="602" text-anchor="middle" class="node-title">注入上下文</text>
  <text x="900" y="630" text-anchor="middle" class="mono">hookSpecificOutput.additionalContext</text>
  <text x="900" y="656" text-anchor="middle" class="small">Codex CLI 显示为 hook context</text>

  <rect class="node-orange" x="700" y="732" width="400" height="114"/>
  <text x="900" y="768" text-anchor="middle" class="node-title">窄范围保存用户事实</text>
  <text x="900" y="796" text-anchor="middle" class="node-text">如“我喜欢吃牛肉”</text>
  <text x="900" y="824" text-anchor="middle" class="small">no-LLM 模式也可记简单偏好</text>

  <rect class="node-purple" x="700" y="900" width="400" height="116"/>
  <text x="900" y="936" text-anchor="middle" class="node-title">Stop hook</text>
  <text x="900" y="964" text-anchor="middle" class="node-text">回合结束保存 assistant 摘要</text>
  <text x="900" y="992" text-anchor="middle" class="mono">POST /api/v1/memories</text>

  <rect class="callout" x="682" y="1062" width="436" height="92"/>
  <text x="900" y="1098" text-anchor="middle" class="node-title">共享 PowerMem 后端</text>
  <text x="900" y="1126" text-anchor="middle" class="node-text">本地服务或远端集群均可</text>

  <!-- Uninstall lane -->
  <rect class="node-red" x="1280" y="250" width="400" height="96"/>
  <text x="1480" y="286" text-anchor="middle" class="node-title">Layer 1：删除 hook</text>
  <text x="1480" y="314" text-anchor="middle" class="mono">codex plugin remove powermem-codex-plugin</text>

  <polygon class="decision" points="1480,400 1660,484 1480,568 1300,484"/>
  <text x="1480" y="472" text-anchor="middle" class="node-title">继续下一层？</text>
  <text x="1480" y="500" text-anchor="middle" class="small">不继续则保留本地服务与数据</text>

  <rect class="node-orange" x="1280" y="620" width="400" height="104"/>
  <text x="1480" y="657" text-anchor="middle" class="node-title">Layer 2：删除 marketplace</text>
  <text x="1480" y="686" text-anchor="middle" class="mono">codex plugin marketplace remove powermem-local</text>
  <text x="1480" y="710" text-anchor="middle" class="small">只在该 marketplace 专供此插件时执行</text>

  <polygon class="decision" points="1480,778 1660,862 1480,946 1300,862"/>
  <text x="1480" y="850" text-anchor="middle" class="node-title">继续清本地？</text>
  <text x="1480" y="878" text-anchor="middle" class="small">先判断是否影响 Claude Code</text>

  <rect class="node-red" x="1262" y="998" width="436" height="132"/>
  <text x="1480" y="1035" text-anchor="middle" class="node-title">Layer 3：本地服务配置</text>
  <text x="1480" y="1064" text-anchor="middle" class="node-text">可选：停服务 / 删 runtime.env / 删 .env</text>
  <text x="1480" y="1092" text-anchor="middle" class="node-text">危险：删除 ~/.powermem 需要确认词</text>
  <text x="1480" y="1118" text-anchor="middle" class="mono">delete-powermem-data</text>

  <!-- Arrows init -->
  <path class="arrow" d="M320,338 L320,386"/>
  <path class="arrow" d="M320,472 L320,522"/>
  <path class="arrow" d="M320,702 L320,752"/>
  <path class="arrow" d="M320,868 L320,918"/>
  <path class="arrow" d="M320,1036 L320,1076"/>

  <!-- Arrows runtime -->
  <path class="arrow" d="M900,346 L900,400"/>
  <path class="arrow" d="M900,512 L900,566"/>
  <path class="arrow" d="M900,678 L900,732"/>
  <path class="arrow" d="M900,846 L900,900"/>
  <path class="arrow" d="M900,1016 L900,1062"/>

  <!-- Arrows uninstall -->
  <path class="arrow" d="M1480,346 L1480,400"/>
  <path class="arrow" d="M1480,568 L1480,620"/>
  <path class="arrow" d="M1480,724 L1480,778"/>
  <path class="arrow" d="M1480,946 L1480,998"/>

  <!-- Cross-lane soft arrows -->
  <path class="arrow-soft" d="M520,1116 C600,1116 610,298 700,298"/>
  <text x="610" y="186" text-anchor="middle" class="small">runtime.env 供 hooks 读取</text>

  <path class="arrow-soft" d="M1100,1110 C1180,1110 1185,1064 1262,1064"/>
  <text x="1190" y="1175" text-anchor="middle" class="small">卸载 Layer 3 才会影响本地 PowerMem</text>

  <rect class="callout" x="90" y="1190" width="1620" height="58"/>
  <text x="900" y="1226" text-anchor="middle" class="node-text">关键原则：hook 不启动服务，只读 runtime.env；默认卸载只移除 Codex hook/plugin，不影响 Claude Code 共用的本地记忆。</text>
</svg>
