<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="5200" viewBox="0 0 2400 5200" role="img" aria-labelledby="title desc">
  <title id="title">PowerMem Claude Code 插件 init 与 hook 流程</title>
  <desc id="desc">init.sh 负责确保可用的 PowerMem HTTP 服务，并把服务地址写入 runtime.env。hook 只读取 POWERMEM_BASE_URL 并调用服务。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#26323f"/>
    </marker>
    <style>
      .title { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 40px; font-weight: 700; fill: #17202a; }
      .subtitle { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; fill: #4c5b6a; }
      .section-title { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #314155; }
      .sub-title { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 23px; font-weight: 700; fill: #314155; }
      .text { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 20px; fill: #17202a; }
      .small { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #4c5b6a; }
      .label { font-family: "Droid Sans Fallback", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #26323f; }
      .section { fill: #f7f9fc; stroke: #d8dee8; stroke-width: 1.2; rx: 18; }
      .subflow { fill: #ffffff; stroke: #b5c0cf; stroke-width: 1.5; rx: 18; }
      .box { fill: #ffffff; stroke: #617184; stroke-width: 1.8; rx: 14; }
      .config { fill: #f5fbff; stroke: #39739d; stroke-width: 1.8; rx: 14; }
      .service { fill: #f5fff7; stroke: #3d7a49; stroke-width: 1.8; rx: 14; }
      .runtime { fill: #f7f3ff; stroke: #7156a4; stroke-width: 1.8; rx: 14; }
      .warn { fill: #fff7f7; stroke: #b35c5c; stroke-width: 1.8; rx: 14; }
      .decision { fill: #fffaf0; stroke: #9a6b1f; stroke-width: 1.8; }
      .line { fill: none; stroke: #26323f; stroke-width: 2.2; marker-end: url(#arrow); }
      .plain-line { fill: none; stroke: #26323f; stroke-width: 2.2; }
      .dash { fill: none; stroke: #7156a4; stroke-width: 2.2; stroke-dasharray: 10 7; marker-end: url(#arrow); }
      .success-line { fill: none; stroke: #2f6d3d; stroke-width: 2.4; marker-end: url(#arrow); }
      .success-bus { fill: none; stroke: #2f6d3d; stroke-width: 2.4; stroke-dasharray: 12 8; }
      .fail-line { fill: none; stroke: #9f4d4d; stroke-width: 2.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="2400" height="5200" fill="#fbfcfe"/>

  <text x="90" y="76" class="title">init.sh：确保 PowerMem 服务可用，并配置 POWERMEM_BASE_URL</text>
  <text x="90" y="123" class="subtitle">主线是 init 显式执行；hook 不会启动 server，只读取地址并调用 HTTP API。</text>

  <rect x="70" y="170" width="2260" height="4100" class="section"/>
  <text x="115" y="225" class="section-title">init.sh：准备、校验、复用或启动 PowerMem 后端服务</text>

  <rect x="650" y="285" width="920" height="104" class="box"/>
  <text x="1110" y="328" text-anchor="middle" class="text">显式运行 init.sh</text>
  <text x="1110" y="360" text-anchor="middle" class="small">手动执行，或通过 /memory-powermem:init 执行</text>

  <rect x="1665" y="276" width="440" height="122" class="warn"/>
  <text x="1885" y="320" text-anchor="middle" class="text">注意</text>
  <text x="1885" y="352" text-anchor="middle" class="small">hook 不触发 init.sh</text>
  <text x="1885" y="378" text-anchor="middle" class="small">hook 也不会自动启动 server</text>

  <!-- success address bus -->
  <path class="success-bus" d="M2070,1130 L2070,4080"/>
  <text x="2090" y="2460" class="label">健康服务地址汇流</text>

  <!-- subflow A -->
  <rect x="250" y="470" width="1720" height="390" class="subflow"/>
  <text x="295" y="522" class="sub-title">子流程 A：准备 ~/.powermem/.env</text>

  <rect x="680" y="570" width="860" height="78" class="config"/>
  <text x="1110" y="603" text-anchor="middle" class="text">检查 ~/.powermem/.env 是否存在</text>
  <text x="1110" y="628" text-anchor="middle" class="small">默认数据目录是 ~/.powermem，可用 POWERMEM_DATA_DIR 覆盖</text>

  <rect x="375" y="720" width="600" height="86" class="config"/>
  <text x="675" y="755" text-anchor="middle" class="text">已存在：复用</text>
  <text x="675" y="783" text-anchor="middle" class="small">init 不覆盖已有配置</text>

  <rect x="1245" y="700" width="600" height="126" class="config"/>
  <text x="1545" y="740" text-anchor="middle" class="text">不存在：生成</text>
  <text x="1545" y="770" text-anchor="middle" class="small">先读当前进程环境变量</text>
  <text x="1545" y="798" text-anchor="middle" class="small">失败后用 ~/.claude/settings.json 兜底</text>

  <!-- subflow B -->
  <rect x="250" y="940" width="1720" height="570" class="subflow"/>
  <text x="295" y="992" class="sub-title">子流程 B：已有 .env 时，先检查是否有可复用的 managed server</text>

  <rect x="500" y="1060" width="560" height="82" class="service"/>
  <text x="780" y="1093" text-anchor="middle" class="text">1. 读取 managed PID</text>
  <text x="780" y="1122" text-anchor="middle" class="small">~/.powermem/powermem.pid，兼容旧 server.pid</text>

  <rect x="500" y="1200" width="560" height="104" class="service"/>
  <text x="780" y="1238" text-anchor="middle" class="text">2. 校验 PID 指向的进程</text>
  <text x="780" y="1268" text-anchor="middle" class="small">进程存在，命令包含 powermem-server</text>

  <rect x="500" y="1360" width="560" height="104" class="service"/>
  <text x="780" y="1398" text-anchor="middle" class="text">3. 校验对应当前 .env</text>
  <text x="780" y="1428" text-anchor="middle" class="small">Linux 且 /proc 可读时，检查 POWERMEM_ENV_FILE</text>

  <path d="M1355,1158 L1565,1260 L1355,1362 L1145,1260 Z" class="decision"/>
  <text x="1355" y="1247" text-anchor="middle" class="text">managed 服务健康？</text>
  <text x="1355" y="1278" text-anchor="middle" class="small">GET /api/v1/system/health</text>

  <rect x="1605" y="1120" width="285" height="92" class="service"/>
  <text x="1748" y="1157" text-anchor="middle" class="text">健康：复用</text>
  <text x="1748" y="1186" text-anchor="middle" class="small">从进程参数恢复 host / port</text>

  <rect x="1605" y="1320" width="285" height="122" class="warn"/>
  <text x="1748" y="1360" text-anchor="middle" class="text">不健康或不匹配</text>
  <text x="1748" y="1392" text-anchor="middle" class="small">停止 unhealthy managed server</text>
  <text x="1748" y="1420" text-anchor="middle" class="small">清理 managed PID 后继续</text>

  <!-- subflow C -->
  <rect x="250" y="1590" width="1720" height="430" class="subflow"/>
  <text x="295" y="1642" class="sub-title">子流程 C：校验 LLM 配置</text>

  <rect x="445" y="1710" width="500" height="96" class="config"/>
  <text x="695" y="1742" text-anchor="middle" class="text">1. 读取 ~/.powermem/.env</text>
  <text x="695" y="1772" text-anchor="middle" class="small">LLM_PROVIDER / LLM_MODEL</text>
  <text x="695" y="1800" text-anchor="middle" class="small">LLM_API_KEY 或 LLM_AUTH_TOKEN</text>

  <rect x="1025" y="1710" width="500" height="96" class="config"/>
  <text x="1275" y="1748" text-anchor="middle" class="text">2. 决定是否远程试探</text>
  <text x="1275" y="1778" text-anchor="middle" class="small">ollama、vllm 或无凭证时跳过请求</text>

  <rect x="700" y="1860" width="650" height="98" class="config"/>
  <text x="1025" y="1898" text-anchor="middle" class="text">3. 对支持的 provider 发起最小请求</text>
  <text x="1025" y="1928" text-anchor="middle" class="small">失败则 init 退出，不继续启动 server</text>

  <rect x="1525" y="1848" width="320" height="122" class="warn"/>
  <text x="1685" y="1890" text-anchor="middle" class="text">校验失败</text>
  <text x="1685" y="1920" text-anchor="middle" class="small">提示 provider / model</text>
  <text x="1685" y="1948" text-anchor="middle" class="small">API key、auth token 或 base URL 后退出</text>

  <!-- subflow D -->
  <rect x="250" y="2100" width="1720" height="590" class="subflow"/>
  <text x="295" y="2152" class="sub-title">子流程 D：准备本机运行环境</text>

  <rect x="430" y="2220" width="560" height="92" class="service"/>
  <text x="710" y="2258" text-anchor="middle" class="text">1. 准备 uvx 后端来源</text>
  <text x="710" y="2288" text-anchor="middle" class="small">默认 powermem[server,seekdb]，也可指向 Git</text>

  <rect x="430" y="2380" width="560" height="142" class="service"/>
  <text x="710" y="2416" text-anchor="middle" class="text">2. 通过 uvx 启动 powermem-server</text>
  <text x="710" y="2446" text-anchor="middle" class="small">已有可执行文件则复用，不重装</text>
  <text x="710" y="2474" text-anchor="middle" class="small">CN 包解析追加 TUNA default index</text>
  <text x="710" y="2502" text-anchor="middle" class="small">默认使用 embedded seekdb 存储</text>

  <rect x="1075" y="2220" width="620" height="122" class="service"/>
  <text x="1385" y="2260" text-anchor="middle" class="text">3. uv 安装与镜像选择</text>
  <text x="1385" y="2290" text-anchor="middle" class="small">公网 IP 检测为 CN 时追加</text>
  <text x="1385" y="2318" text-anchor="middle" class="small">-i https://pypi.tuna.tsinghua.edu.cn/simple</text>

  <rect x="1075" y="2410" width="620" height="118" class="service"/>
  <text x="1385" y="2450" text-anchor="middle" class="text">4. 可选预下载 embedding 模型</text>
  <text x="1385" y="2480" text-anchor="middle" class="small">POWERMEM_INIT_PRELOAD_MODEL=1</text>
  <text x="1385" y="2508" text-anchor="middle" class="small">preload-model.sh 通过 uvx --from modelscope 运行</text>

  <rect x="680" y="2580" width="760" height="55" class="service"/>
  <text x="1060" y="2616" text-anchor="middle" class="small">输出：本机已有可执行的 powermem-server，可用于启动 managed 服务</text>

  <!-- subflow E -->
  <rect x="250" y="2770" width="1720" height="640" class="subflow"/>
  <text x="295" y="2822" class="sub-title">子流程 E：选择要给 hook 使用的健康服务</text>

  <rect x="430" y="2890" width="520" height="102" class="service"/>
  <text x="690" y="2928" text-anchor="middle" class="text">1. 再次检查 managed server</text>
  <text x="690" y="2958" text-anchor="middle" class="small">安装期间如果服务已恢复，可直接复用</text>

  <rect x="430" y="3060" width="520" height="118" class="runtime"/>
  <text x="690" y="3098" text-anchor="middle" class="text">2. 检查外部候选 base URL</text>
  <text x="690" y="3128" text-anchor="middle" class="small">POWERMEM_BASE_URL &gt; runtime.env &gt; 默认 8848</text>
  <text x="690" y="3156" text-anchor="middle" class="small">健康则复用，不启动 managed server</text>

  <path d="M1325,2945 L1550,3060 L1325,3175 L1100,3060 Z" class="decision"/>
  <text x="1325" y="3045" text-anchor="middle" class="text">找到健康服务？</text>
  <text x="1325" y="3076" text-anchor="middle" class="small">managed 或外部 backend</text>

  <rect x="1600" y="2910" width="290" height="108" class="service"/>
  <text x="1745" y="2950" text-anchor="middle" class="text">是：复用服务地址</text>
  <text x="1745" y="2980" text-anchor="middle" class="small">不启动新的 server</text>

  <rect x="1600" y="3160" width="290" height="108" class="warn"/>
  <text x="1745" y="3200" text-anchor="middle" class="text">否：启动新的</text>
  <text x="1745" y="3230" text-anchor="middle" class="small">进入子流程 F</text>

  <!-- subflow F -->
  <rect x="250" y="3490" width="1720" height="540" class="subflow"/>
  <text x="295" y="3542" class="sub-title">子流程 F：启动新的 managed powermem-server</text>

  <rect x="400" y="3610" width="500" height="96" class="service"/>
  <text x="650" y="3648" text-anchor="middle" class="text">1. 选择端口</text>
  <text x="650" y="3678" text-anchor="middle" class="small">POWERMEM_INIT_PORT -> 8848 -> 8849-8899</text>

  <rect x="985" y="3610" width="600" height="120" class="service"/>
  <text x="1285" y="3648" text-anchor="middle" class="text">2. 使用当前 .env 启动</text>
  <text x="1285" y="3678" text-anchor="middle" class="small">POWERMEM_ENV_FILE=~/.powermem/.env</text>
  <text x="1285" y="3706" text-anchor="middle" class="small">nohup powermem-server --host 127.0.0.1 --port &lt;port&gt;</text>

  <rect x="400" y="3790" width="500" height="86" class="service"/>
  <text x="650" y="3828" text-anchor="middle" class="text">3. 记录 managed PID</text>
  <text x="650" y="3858" text-anchor="middle" class="small">写 ~/.powermem/powermem.pid</text>

  <path d="M1285,3805 L1505,3915 L1285,4025 L1065,3915 Z" class="decision"/>
  <text x="1285" y="3902" text-anchor="middle" class="text">120 秒内 health 通过？</text>
  <text x="1285" y="3933" text-anchor="middle" class="small">GET /api/v1/system/health</text>

  <rect x="1600" y="3815" width="290" height="118" class="warn"/>
  <text x="1745" y="3855" text-anchor="middle" class="text">失败</text>
  <text x="1745" y="3885" text-anchor="middle" class="small">停止刚启动的 server</text>
  <text x="1745" y="3913" text-anchor="middle" class="small">清理 PID，不写 runtime.env</text>

  <!-- subflow G -->
  <rect x="250" y="4110" width="1720" height="290" class="subflow"/>
  <text x="295" y="4162" class="sub-title">子流程 G：配置 POWERMEM_BASE_URL</text>

  <rect x="585" y="4220" width="1050" height="96" class="runtime"/>
  <text x="1110" y="4258" text-anchor="middle" class="text">写 ~/.powermem/runtime.env</text>
  <text x="1110" y="4288" text-anchor="middle" class="small">POWERMEM_BASE_URL=http://host:port</text>
  <text x="1110" y="4316" text-anchor="middle" class="small">同时记录 POWERMEM_ENV_FILE=~/.powermem/.env</text>

  <!-- hook section -->
  <rect x="70" y="4540" width="2260" height="500" class="section"/>
  <text x="115" y="4595" class="section-title">hook：读取 POWERMEM_BASE_URL 并调用服务</text>

  <rect x="160" y="4685" width="455" height="102" class="box"/>
  <text x="388" y="4726" text-anchor="middle" class="text">1. Claude Code 触发 hook</text>
  <text x="388" y="4756" text-anchor="middle" class="small">UserPromptSubmit / hook write events</text>

  <rect x="725" y="4675" width="505" height="126" class="runtime"/>
  <text x="978" y="4715" text-anchor="middle" class="text">2. run-hook.sh 读取地址配置</text>
  <text x="978" y="4745" text-anchor="middle" class="small">$POWERMEM_DATA_DIR/runtime.env</text>
  <text x="978" y="4773" text-anchor="middle" class="small">然后读取 plugin config/runtime.env</text>

  <rect x="1340" y="4675" width="430" height="126" class="runtime"/>
  <text x="1555" y="4715" text-anchor="middle" class="text">3. hook binary 决定 base URL</text>
  <text x="1555" y="4745" text-anchor="middle" class="small">优先用 POWERMEM_BASE_URL</text>
  <text x="1555" y="4773" text-anchor="middle" class="small">未设置则默认 http://localhost:8848</text>

  <rect x="1880" y="4685" width="360" height="102" class="service"/>
  <text x="2060" y="4726" text-anchor="middle" class="text">4. 调用 powermem-server</text>
  <text x="2060" y="4756" text-anchor="middle" class="small">搜索上下文或写入记忆</text>

  <!-- main arrows -->
  <path class="line" d="M1110,389 L1110,470"/>
  <path class="line" d="M1110,860 L1110,940"/>
  <path class="line" d="M1110,1510 L1110,1590"/>
  <path class="line" d="M1110,2020 L1110,2100"/>
  <path class="line" d="M1110,2690 L1110,2770"/>
  <path class="line" d="M1110,3410 L1110,3490"/>
  <path class="line" d="M1110,4400 L1110,4540"/>

  <!-- A arrows -->
  <path class="line" d="M1110,648 L675,720"/>
  <text x="835" y="684" class="label">存在</text>
  <path class="line" d="M1110,648 L1545,700"/>
  <text x="1340" y="684" class="label">不存在</text>
  <path class="line" d="M675,806 L980,842"/>
  <path class="line" d="M1545,826 L1240,842"/>

  <!-- B arrows -->
  <path class="line" d="M780,1142 L780,1200"/>
  <path class="line" d="M780,1304 L780,1360"/>
  <path class="line" d="M1060,1412 L1210,1330"/>
  <path class="success-line" d="M1565,1260 L1605,1166"/>
  <path class="success-line" d="M1890,1166 L2070,1166"/>
  <text x="1578" y="1232" class="label">健康</text>
  <path class="fail-line" d="M1565,1260 L1605,1382"/>
  <text x="1572" y="1325" class="label">失败</text>

  <!-- C arrows -->
  <path class="line" d="M945,1758 L1025,1758"/>
  <path class="line" d="M1275,1806 L1130,1860"/>
  <path class="fail-line" d="M1350,1909 L1525,1909"/>
  <text x="1405" y="1885" class="label">失败</text>

  <!-- D arrows -->
  <path class="line" d="M710,2312 L710,2380"/>
  <path class="line" d="M990,2443 L1075,2281"/>
  <path class="line" d="M1385,2342 L1385,2410"/>
  <path class="line" d="M710,2506 L890,2580"/>
  <path class="line" d="M1385,2528 L1230,2580"/>

  <!-- E arrows -->
  <path class="line" d="M690,2992 L690,3060"/>
  <path class="line" d="M950,2941 L1135,3022"/>
  <path class="line" d="M950,3119 L1135,3098"/>
  <path class="success-line" d="M1550,3060 L1600,2964"/>
  <path class="success-line" d="M1890,2964 L2070,2964"/>
  <text x="1565" y="3032" class="label">是</text>
  <path class="fail-line" d="M1550,3060 L1600,3214"/>
  <text x="1565" y="3155" class="label">否</text>

  <!-- F arrows -->
  <path class="line" d="M900,3658 L985,3670"/>
  <path class="line" d="M985,3708 L900,3798"/>
  <path class="line" d="M900,3833 L1085,3885"/>
  <path class="success-line" d="M1285,4025 L1285,4070 L2070,4070"/>
  <text x="1310" y="4054" class="label">通过</text>
  <path class="fail-line" d="M1505,3915 L1600,3874"/>
  <text x="1530" y="3955" class="label">失败</text>

  <!-- success bus to runtime -->
  <path class="success-line" d="M2070,4080 L1635,4268"/>

  <!-- runtime to hook -->
  <path class="dash" d="M1110,4316 L1110,4675"/>
  <text x="1130" y="4490" class="label">runtime.env 提供 POWERMEM_BASE_URL</text>

  <!-- hook arrows -->
  <path class="line" d="M615,4736 L725,4736"/>
  <path class="line" d="M1230,4738 L1340,4738"/>
  <path class="line" d="M1770,4738 L1880,4738"/>
</svg>
