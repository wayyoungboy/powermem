          echo "Waiting for SeekDB to be ready..."
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if sudo docker exec seekdb mysql -uroot -e "SELECT 1" > /dev/null 2>&1; then
              echo "✓ SeekDB is ready!"
              break
            fi
            echo "Waiting for SeekDB... ($elapsed/$timeout seconds)"
            sleep 2
            elapsed=$((elapsed + 2))
          done
          if [ $elapsed -ge $timeout ]; then
            echo "⚠ Warning: SeekDB may not be fully ready, but continuing..."
          fi
          # Show container status
          echo "SeekDB container status:"
          sudo docker ps | grep seekdb || true
          echo "Recent logs:"
          sudo docker logs --tail 20 seekdb || true
          mysql -uroot -h127.0.0.1 -P10001 -e "CREATE DATABASE IF NOT EXISTS powermem;" || echo "⚠ Warning: Failed to create database, but continuing..."
          mysql -uroot -h127.0.0.1 -P10001 -e "SHOW DATABASES LIKE 'powermem';" || echo "⚠ Warning: Could not verify database, but continuing..."

      - name: Set env
        env:
          QWEN_API_KEY: "${{ secrets.QWEN_API_KEY }}"
          SILICONFLOW_CN_API_KEY: "${{ secrets.SILICONFLOW_CN_API_KEY }}"
          SILICONFLOW_COM_API_KEY: "${{ secrets.SILICONFLOW_COM_API_KEY }}"
        run: |
          echo "QWEN_API_KEY length: ${#QWEN_API_KEY}"
          echo "SILICONFLOW_CN_API_KEY length: ${#SILICONFLOW_CN_API_KEY}"
          echo "SILICONFLOW_COM_API_KEY length: ${#SILICONFLOW_COM_API_KEY}"
          cp .env.example .env
          set_env_var() {
            local key="$1"
            local value="$2"
            awk -v prefix="${key}=" 'index($0, prefix) != 1 { print }' .env > .env.tmp
            mv .env.tmp .env
            printf '%s=%s\n' "${key}" "${value}" >> .env
          }
          # Update existing environment variables
          set_env_var OCEANBASE_HOST 127.0.0.1
          set_env_var OCEANBASE_PORT 10001
          set_env_var OCEANBASE_USER root
          set_env_var OCEANBASE_PASSWORD ""
          set_env_var OCEANBASE_DATABASE powermem
          set_env_var OCEANBASE_COLLECTION memories_1536
          set_env_var DATABASE_PROVIDER oceanbase
          set_env_var LLM_PROVIDER siliconflow
          set_env_var LLM_MODEL THUDM/GLM-4-9B-0414
          set_env_var SILICONFLOW_LLM_BASE_URL https://api.siliconflow.cn/v1
          set_env_var EMBEDDING_PROVIDER qwen
          set_env_var EMBEDDING_MODEL text-embedding-v4
          set_env_var EMBEDDING_DIMS 1536
          set_env_var QWEN_EMBEDDING_BASE_URL https://dashscope.aliyuncs.com/api/v1
          set_env_var GRAPH_STORE_PORT 10001
          set_env_var GRAPH_STORE_PASSWORD ""
          set_env_var OCEANBASE_EMBEDDING_MODEL_DIMS 1536
          set_env_var LLM_API_KEY "${SILICONFLOW_CN_API_KEY}"
          set_env_var EMBEDDING_API_KEY "${QWEN_API_KEY}"
          set_env_var POWERMEM_SERVER_API_KEYS key1,key2,key3
          set_env_var POWERMEM_SERVER_WORKERS 1

      - name: Run regression tests
        id: run_tests
        env:
          QWEN_API_KEY: "${{ secrets.QWEN_API_KEY }}"
          SILICONFLOW_CN_API_KEY: "${{ secrets.SILICONFLOW_CN_API_KEY }}"
          SILICONFLOW_COM_API_KEY: "${{ secrets.SILICONFLOW_COM_API_KEY }}"
        run: |
          mkdir -p report
          pytest tests/regression/ --ignore-glob='*test_scenario*.py' -vs --junitxml=report/test2.xml
      - name: Upload JUnit report
        if: always() && (steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: junit-test2
          path: report/
      - name: Cleanup Docker
        if: always()
        run: |
          echo "清理 Docker 容器..."
          sudo docker rm -f seekdb 2>/dev/null || true
          sudo docker ps
          echo "✓ 清理完成"

  report:
    runs-on: ubuntu-latest
    needs: [test1, test2]
    if: always() && (needs.test1.result == 'success' || needs.test1.result == 'failure') && (needs.test2.result == 'success' || needs.test2.result == 'failure')
    steps:
      - name: Download JUnit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: junit-*
      - name: Collect JUnit reports
        run: |
          mkdir -p all-reports
          # download-artifact may only fetch reports from successful test shards.
          # Search existing junit-* directories instead of assuming every shard
          # produced an artifact.
          report_dirs=(junit-*)
          if [ -d "${report_dirs[0]}" ]; then
            find "${report_dirs[@]}" -maxdepth 3 -name '*.xml' -exec cp {} all-reports/ \;
          else
            echo "No JUnit artifact directories found."
          fi
          ls -la all-reports/
      - name: Publish Test Report Summary
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'all-reports/*.xml'
          require_tests: false
          job_name: Regression Tests
          check_name: Test Report
