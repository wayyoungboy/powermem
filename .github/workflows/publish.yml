# Uploads to PyPI when a release is published. Built package includes Dashboard (frontend injected before build).
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Version tag to publish, for example v1.1.2'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-build:
    if: startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'v') && !startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'plugins-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Build Dashboard
        run: |
          cd dashboard
          pnpm install
          pnpm build
          # static files: ./dashboard/dist

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Inject Frontend and Build Package
        run: |
          python -m pip install --upgrade pip
          pip install build

          mkdir -p src/server/dashboard
          cp -r dashboard/dist/* src/server/dashboard/

          python scripts/check_package_versions.py

          rm -rf dist
          mkdir -p dist
          python -m build -o dist

          rm -rf dist-mcp packages/powermem-mcp/dist packages/powermem-mcp/build
          rm -rf packages/powermem-mcp/*.egg-info packages/powermem-mcp/src/*.egg-info
          mkdir -p dist-mcp
          cd packages/powermem-mcp
          python -m build -o ../../dist-mcp

      - name: Upload powermem dists
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Upload powermem-mcp dists
        uses: actions/upload-artifact@v4
        with:
          name: release-mcp-dists
          path: dist-mcp/

  pypi-publish-powermem:
    if: startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'v') && !startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'plugins-')
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  pypi-publish-powermem-mcp:
    if: startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'v') && !startsWith(github.event.release.tag_name || github.event.inputs.release_tag, 'plugins-')
    runs-on: ubuntu-latest
    needs:
      - pypi-publish-powermem
    permissions:
      id-token: write

    steps:
      - name: Retrieve powermem-mcp release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-mcp-dists
          path: dist/

      - name: Publish powermem-mcp distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
