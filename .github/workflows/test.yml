name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'apps/claude-code-plugin/**'
      - 'docker/Dockerfile.claude-hook-regression'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/test.yml'
      - '../../benchmark/locomo/requirements.txt'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'apps/claude-code-plugin/**'
      - 'docker/Dockerfile.claude-hook-regression'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/test.yml'
      - '../../benchmark/locomo/requirements.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run tests (unit + integration, excluding all e2e tests and regression tests)
        run: |
          uv run --no-project --python "${{ matrix.python-version }}" --with-editable ".[dev,test,server]" pytest --ignore=tests/regression -m "not e2e and not e2e_config"

  verify-benchmark-dependencies:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install and verify dependencies
        working-directory: benchmark/locomo
        run: |
          uv venv --python "${{ matrix.python-version }}"
          uv pip install --python .venv/bin/python -r requirements.txt
          uv pip check --python .venv/bin/python

  claude-hook-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run isolated Claude Code hook regression
        run: make test-claude-hook-docker
